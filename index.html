<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CNT-BET 公网预测平台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <aside class="control-pane">
        <header class="app-title">
          <div>
            <h1>CNT-BET</h1>
            <span>BET 与电阻率预测平台</span>
          </div>
          <span id="version" class="version-pill">Ready</span>
        </header>

        <section class="model-status" id="modelStatus"></section>

        <nav class="mode-tabs" aria-label="工作页">
          <button class="active" data-mode="quick"><span>快速估算</span><small>CNT</small></button>
          <button data-mode="predict"><span>BET预测</span><small>ML</small></button>
          <button data-mode="resistivity"><span>粉末电阻率</span><small>Rho</small></button>
          <button data-mode="inverse"><span>反向设计</span><small>Target</small></button>
        </nav>

        <section id="panel-quick" class="mode-panel active">
          <h2>CNT 快速估算 <small>SWCNT / MWCNT</small></h2>
          <div class="grid two">
            <label>纯度 (%)<input id="quickPurity" type="number" step="0.1" value="96" /></label>
            <label>实测 BET（可选）<input id="quickActual" type="number" step="1" value="260" /></label>
            <label>压实密度（g/cm³，粉末电阻率用）<input id="quickCompactDensity" type="number" step="0.001" value="0.95" /></label>
          </div>
          <table class="edit-table" id="temTable">
            <thead>
              <tr><th>层数</th><th>占比 %</th><th>外径 nm</th><th>长度 μm</th><th></th></tr>
            </thead>
            <tbody></tbody>
          </table>
          <div class="actions">
            <button id="addTemRow" type="button" class="icon-button">+</button>
            <button id="quickRun" type="button" class="primary-action">计算</button>
          </div>
        </section>

        <section id="panel-predict" class="mode-panel">
          <h2>BET预测</h2>
          <label>碳管体系<select id="predictFamily"><option value="mwcnt">MWCNT (结构模型)</option><option value="swcnt">SWCNT (工艺模型)</option></select></label>
          <div id="predictFields" class="field-stack"></div>
          <div class="what-if-grid">
            <label>对比参数1<input id="whatIfKey1" type="text" placeholder="diameter_mean_nm" /></label>
            <label>新值1<input id="whatIfValue1" type="text" /></label>
            <label>对比参数2<input id="whatIfKey2" type="text" placeholder="wall_mean" /></label>
            <label>新值2<input id="whatIfValue2" type="text" /></label>
            <label>对比参数3<input id="whatIfKey3" type="text" placeholder="purity_pct" /></label>
            <label>新值3<input id="whatIfValue3" type="text" /></label>
          </div>
          <div class="actions">
            <button id="explainRun" type="button">解释</button>
            <button id="whatIfRun" type="button">What-if</button>
            <button id="predictRun" type="button" class="primary-action">预测 BET</button>
          </div>
        </section>

        <section id="panel-resistivity" class="mode-panel">
          <h2>粉末电阻率预测</h2>
          <label>碳管体系<select id="resistivityFamily"><option value="mwcnt">MWCNT</option><option value="swcnt">SWCNT（不可用）</option></select></label>
          <div id="resistivityFields" class="field-stack"></div>
          <div class="actions">
            <button id="resistivityRun" type="button" class="primary-action">预测电阻率</button>
          </div>
        </section>

        <section id="panel-inverse" class="mode-panel">
          <h2>目标 BET 反向设计</h2>
          <label>碳管体系<select id="inverseFamily"><option value="mwcnt">MWCNT</option><option value="swcnt">SWCNT</option></select></label>
          <div class="grid three">
            <label>目标 BET<input id="targetBet" type="number" value="220" /></label>
            <label>候选数<input id="candidateCount" type="number" value="3000" /></label>
            <label>推荐数<input id="recommendCount" type="number" value="10" /></label>
          </div>
          <div class="actions">
            <button id="inverseRun" type="button" class="primary-action">搜索</button>
          </div>
        </section>
      </aside>

      <section class="work-pane">
        <header class="workspace-head">
          <div>
            <h2 id="workspaceTitle">快速估算</h2>
            <div class="status-line">
              <strong id="statusText">等待操作</strong>
              <span id="pathLine"></span>
            </div>
          </div>
        </header>
        <section class="metric-grid" id="metricGrid"></section>
        <section class="messages" id="messages"></section>
        <section class="result-area">
          <pre id="resultSummary"></pre>
          <div id="resultTable" class="table-wrap"></div>
        </section>
      </section>
    </main>
    <!-- JS modules: load in dependency order -->
    <script>window.CNTBET_API_BASE = "https://47.236.76.214.nip.io";</script>
    <script src="js/core.js"></script>
    <script src="js/api.js"></script>
    <script src="js/ui.js"></script>
    <script src="js/fields.js"></script>
    <script src="js/tabs-quick.js"></script>
    <script src="js/tabs-predict.js"></script>
    <script src="js/tabs-resistivity.js"></script>
    <script src="js/tabs-inverse.js"></script>
    <script src="js/init.js"></script>
  </body>
</html>
